{% include 'Inc/header.html' %}
{% if messages %}
{% for mensaje in messages %}
<div class="ui container" id="mensajes">
    <div class="ui {{ mensaje.tags }} message">
        <i class="close icon"></i>
        <div class="header">
            {{ mensaje }}
        </div>
    </div>
</div>
{%endfor%}
{% endif%}

<div class="ui container">
    <h1>Registrar Entradas/Salidas Instructores</h1>

    <form action="" method="post" id="formularioingreso" class="ui form">
        {% csrf_token %}
        <!-- PRIMERA FILA -->
        <div class="two fields">
            <div class="field">
                <label for="instructor">Instructor</label>
                <select name="instructor" id="instructor" class="ui dropdown">
                    <option value="">Seleccione un Instructor</option>
                    {% for instructor in instructores %}
                    <option value="{{instructor.id}}">{{instructor.NombreCompleto}}</option>
                    {% endfor%}
                </select>
            </div>
            <div class="field">
                <label for="ambientes">Ambientes de Formación:</label>
                <select name="ambiente" id="ambiente" class="ui dropdown">
                    <option value="">Seleccione los ambientes</option>
                    {% for ambiente in ambientes %}
                    <option value="{{ambiente.id}}">{{ambiente.NombreAmbiente}}</option>
                    {% endfor%}
                </select>
            </div>
        </div>
        <!-- FIN PRIMERA FILA -->
        <!-- SEGUNDA FILA -->
        <div class="field">
            <label for="observacion">Observaciones:</label>
            <textarea name="observacion" id="observacion"></textarea>
        </div>
        <!-- FIN SEGUNDA FILA -->
        <button type="submit" class="ui primary button">Registrar Cuentadancia</button>
    </form>
</div>

{% include 'Inc/Footer.html' %}

<script>
    $("#formularioingreso").form({
        inline: true,
        fields: {
            instructor: {
                identifier: 'instructor',
                rules: [{
                    type: 'empty',
                    prompt: 'Por Favor Seleccione a un instructor'
                }]
            },
            ambiente: {
                identifier: 'ambiente',
                rules: [{
                    type: 'empty',
                    prompt: 'Por Favor Seleccione un Ambiente de Formación'
                }]
            },
            // observacion: {
            //     identifier: 'observacion',
            //     rules: [{
            //         type: 'empty',
            //         prompt: 'Por Favor Escriba una Observación'
            //     }]
            // }
        }
    })
</script>
